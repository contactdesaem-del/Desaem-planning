<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DESAEM — Planning</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --copper:#D4956A;--copper-lt:#F0D5C0;--copper-dk:#A06840;
  --dark:#2D2D2D;--mid:#3D3D3D;--light:#F7F4F1;--white:#fff;
  --grey:#888;--border:#E0DAD4;--danger:#C0392B;--success:#27AE60;
  --warning:#E67E22;--info:#2980B9;
}
body{font-family:'DM Sans',sans-serif;background:var(--light);color:var(--dark);min-height:100vh}
#app{width:100%;max-width:100%;overflow-x:hidden}

/* ── LOGIN ── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--dark);padding:1rem}
.login-box{background:var(--white);border-radius:16px;padding:2.5rem 2rem;width:100%;max-width:360px;text-align:center}
.login-logo{width:140px;margin:0 auto 1.5rem}
.login-box h2{font-size:1.1rem;font-weight:500;color:var(--grey);margin-bottom:1.5rem}
.login-box input{width:100%;border:1px solid var(--border);border-radius:8px;padding:.75rem 1rem;font-size:.95rem;font-family:inherit;margin-bottom:.75rem;outline:none;transition:border .2s}
.login-box input:focus{border-color:var(--copper)}
.login-box button{width:100%;background:var(--copper);color:var(--white);border:none;border-radius:8px;padding:.85rem;font-size:1rem;font-weight:600;font-family:inherit;cursor:pointer;transition:background .2s}
.login-box button:hover{background:var(--copper-dk)}
.login-error{color:var(--danger);font-size:.85rem;margin-top:.5rem}

/* ── APP ── */
#app{display:none;flex-direction:column;min-height:100vh}

/* TOPBAR */
.topbar{background:var(--dark);padding:.75rem 1rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-logo{height:32px}
.topbar-right{display:flex;align-items:center;gap:.75rem}
.topbar-user{color:#ccc;font-size:.85rem}
.topbar-logout{background:none;border:1px solid #555;color:#ccc;border-radius:6px;padding:.3rem .75rem;font-size:.8rem;font-family:inherit;cursor:pointer}
.topbar-logout:hover{border-color:var(--copper);color:var(--copper)}

/* NAV */
.nav{background:var(--white);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;padding:0 1rem}
.nav-btn{background:none;border:none;border-bottom:3px solid transparent;padding:.75rem 1rem;font-size:.9rem;font-family:inherit;color:var(--grey);cursor:pointer;white-space:nowrap;transition:all .2s}
.nav-btn.active{color:var(--copper);border-bottom-color:var(--copper);font-weight:500}

/* CONTENT */
.content{padding:1rem;flex:1;min-width:0;transition:all .1s}
.content.planning-active{padding:0 !important;max-width:100% !important;width:100% !important;margin:0 !important}
.tab-content#tab-planning{padding:0}
#tab-planning .cal-header-bar{padding:.5rem 1rem;background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}

/* CARDS */
.card{background:var(--white);border-radius:12px;border:1px solid var(--border);padding:1.25rem;margin-bottom:1rem}
.card-title{font-size:1rem;font-weight:600;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}

/* STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1rem}
.stat{background:var(--white);border-radius:10px;border:1px solid var(--border);padding:1rem;text-align:center}
.stat-num{font-size:1.6rem;font-weight:600;color:var(--copper)}
.stat-lbl{font-size:.75rem;color:var(--grey);margin-top:.2rem}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:.4rem;border:none;border-radius:8px;padding:.6rem 1rem;font-size:.85rem;font-weight:500;font-family:inherit;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--copper);color:var(--white)}
.btn-primary:hover{background:var(--copper-dk)}
.btn-sm{padding:.35rem .75rem;font-size:.8rem}
.btn-danger{background:#FEE;color:var(--danger);border:1px solid #FCC}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--dark)}
.btn-ghost:hover{border-color:var(--copper);color:var(--copper)}

/* BADGES */
.badge{display:inline-block;padding:.25rem .6rem;border-radius:20px;font-size:.75rem;font-weight:500}
.badge-green{background:#EAF7EF;color:#1E8449}
.badge-orange{background:#FEF0E5;color:#B7500A}
.badge-blue{background:#EBF5FB;color:#1A5276}
.badge-grey{background:#F0F0F0;color:#666}
.badge-red{background:#FDEDEC;color:var(--danger)}

/* MISSION LIST */
.mission-item{background:var(--white);border-radius:10px;border:1px solid var(--border);padding:1rem;margin-bottom:.75rem;border-left:5px solid var(--copper)}
.mission-item.status-confirme{border-left-color:var(--success)}
.mission-item.status-termine{border-left-color:var(--grey)}
.mission-item.status-annule{border-left-color:var(--danger)}
.mission-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.5rem}
.mission-client{font-weight:600;font-size:.95rem}
.mission-date{font-size:.8rem;color:var(--grey)}
.mission-addr{font-size:.85rem;color:var(--info);text-decoration:none;display:flex;align-items:center;gap:.3rem;margin:.3rem 0}
.mission-addr:hover{text-decoration:underline}
.mission-tel{font-size:.85rem;color:var(--success);text-decoration:none;display:flex;align-items:center;gap:.3rem}
.mission-desc{font-size:.85rem;color:#555;margin:.5rem 0}
.mission-footer{display:flex;justify-content:space-between;align-items:center;margin-top:.75rem;flex-wrap:gap}
.mission-monteurs{font-size:.8rem;color:var(--grey)}
.mission-actions{display:flex;gap:.4rem;flex-wrap:wrap}

/* PRIX (admin only) */
.mission-prix{font-size:.85rem;font-weight:600;color:var(--copper-dk);background:var(--copper-lt);padding:.2rem .6rem;border-radius:6px}

/* CALENDAR */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.cal-nav{background:none;border:1px solid var(--border);border-radius:6px;padding:.3rem .7rem;cursor:pointer;font-size:.9rem}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-day-name{text-align:center;font-size:.7rem;color:var(--grey);padding:.4rem 0;font-weight:500}
.cal-day{min-height:42px;border-radius:6px;padding:.3rem;font-size:.8rem;cursor:pointer;transition:background .15s;border:1px solid transparent}
.cal-day:hover{background:var(--copper-lt)}
.cal-day.today{background:var(--copper-lt);border-color:var(--copper)}
.cal-day.has-mission{font-weight:600}
.cal-day .cal-dot{width:5px;height:5px;border-radius:50%;background:var(--copper);margin:.2rem auto 0}
.cal-day.other-month{color:#ccc}

/* FORM */
.form-group{margin-bottom:1rem}
.form-label{font-size:.85rem;font-weight:500;color:var(--dark);margin-bottom:.35rem;display:block}
.form-input{width:100%;border:1px solid var(--border);border-radius:8px;padding:.65rem .9rem;font-size:.9rem;font-family:inherit;outline:none;transition:border .2s;background:var(--white)}
.form-input:focus{border-color:var(--copper)}
textarea.form-input{min-height:80px;resize:vertical}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.form-actions{display:flex;gap:.75rem;margin-top:1.25rem}

/* EMPLOYEE */
.emp-item{display:flex;align-items:center;gap:.75rem;padding:.75rem;background:var(--white);border-radius:10px;border:1px solid var(--border);margin-bottom:.6rem}
.emp-avatar{width:38px;height:38px;border-radius:50%;background:var(--copper);color:var(--white);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:.85rem;flex-shrink:0}
.emp-info{flex:1}
.emp-name{font-weight:500;font-size:.9rem}
.emp-role{font-size:.78rem;color:var(--grey)}
.emp-actions{display:flex;gap:.4rem}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:var(--white);border-radius:16px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:1.5rem}
.modal-title{font-size:1.1rem;font-weight:600;margin-bottom:1.25rem;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--grey);line-height:1}

/* CHECKBOX LIST */
.check-list{display:flex;flex-direction:column;gap:.4rem;max-height:150px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;padding:.5rem}
.check-item{display:flex;align-items:center;gap:.6rem;font-size:.9rem;padding:.3rem .5rem;border-radius:6px;cursor:pointer}
.check-item:hover{background:var(--light)}
.check-item input{accent-color:var(--copper)}

/* TABS */
.tab-content{display:none}
.tab-content.active{display:block}

/* PHOTO UPLOAD */
.photo-zone{border:2px dashed var(--border);border-radius:10px;padding:1.5rem;text-align:center;cursor:pointer;transition:border .2s}
.photo-zone:hover{border-color:var(--copper)}
.photo-zone p{color:var(--grey);font-size:.85rem;margin-top:.4rem}
.photo-preview{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.75rem}
.photo-thumb{width:70px;height:70px;object-fit:cover;border-radius:6px;border:1px solid var(--border)}

/* NOTIF TOAST */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--dark);color:var(--white);padding:.75rem 1.5rem;border-radius:30px;font-size:.85rem;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* EMPTY */
.empty{text-align:center;padding:2rem;color:var(--grey)}
.empty svg{width:48px;height:48px;stroke:var(--border);margin-bottom:.75rem}

/* SECTION HEADER */
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.section-title{font-size:1rem;font-weight:600}

/* FILTER */
.filter-row{display:flex;gap:.5rem;overflow-x:auto;margin-bottom:1rem;padding-bottom:.25rem}
.filter-btn{background:var(--white);border:1px solid var(--border);border-radius:20px;padding:.3rem .85rem;font-size:.8rem;font-family:inherit;cursor:pointer;white-space:nowrap;color:var(--grey);transition:all .2s}
.filter-btn.active{background:var(--copper);border-color:var(--copper);color:var(--white)}

/* CHART BAR */
.bar-chart{display:flex;align-items:flex-end;gap:4px;height:80px;margin:.75rem 0}
.bar{flex:1;background:var(--copper-lt);border-radius:4px 4px 0 0;position:relative;min-height:4px;transition:height .3s}
.bar:hover{background:var(--copper)}
.bar-label{font-size:.65rem;color:var(--grey);text-align:center;margin-top:.25rem}
.bar-val{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:.65rem;color:var(--copper-dk);white-space:nowrap}

@media(min-width:600px){
  .content{padding:1.5rem;max-width:700px;margin:0 auto}
  .form-row{grid-template-columns:1fr 1fr 1fr}
  .content.planning-active{padding:0 !important;max-width:100% !important;margin:0 !important;width:100% !important}
}
@media(max-width:599px){
  .content.planning-active{padding:0 !important}
  #planning-view{height:calc(100vh - 130px) !important}
}
</style>
</head>

<script>

let currentUser = null;

let calMonth = new Date().getMonth();
let calYear = new Date().getFullYear();
let missionFilter = 'tous';
let caPeriod = 'mois';

const USERS = [
  {id:1, login:'hilel', pass:'desaem2024', nom:'Hilel', role:'admin', isAdmin:true},
  {id:2, login:'thomas', pass:'monteur123', nom:'Thomas', role:'Monteur', isAdmin:false},
  {id:3, login:'karim', pass:'monteur123', nom:'Karim', role:'Monteur', isAdmin:false},

  {id:8, login:'driss', pass:'monteur124', nom:'Driss', role:'Monteur', isAdmin:false},
  {id:9, login:'dilel', pass:'monteur125', nom:'Dilel', role:'Monteur', isAdmin:false},
];

let employees = [
  {id:2, nom:'Thomas', role:'Monteur', login:'thomas', pass:'monteur123', actif:true},
  {id:3, nom:'Karim', role:'Monteur', login:'karim', pass:'monteur123', actif:true},
  {id:4, nom:'Mehdi', role:'Monteur', login:'mehdi', pass:'monteur123', actif:true},
  {id:5, nom:'Lucas', role:'Monteur', login:'lucas', pass:'monteur123', actif:true},
  {id:6, nom:'Yassine', role:'Monteur', login:'yassine', pass:'monteur123', actif:true},
  {id:7, nom:'Atef', role:'Monteur', login:'atef', pass:'monteur123', actif:true},
  {id:8, nom:'Driss', role:'Monteur', login:'driss', pass:'monteur124', actif:true},
  {id:9, nom:'Dilel', role:'Monteur', login:'dilel', pass:'monteur125', actif:true},
];

let missions = [];
let nextMissionId = 1;
let nextEmpId = 10;

const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbw26eRBpS9CdQKfinwQVzm1xSs_rp9TUpN7QtPEe18OFTnCBhYBcSvFtpOIhwUwMWQ52g/exec';

async function saveMissionsToSheets() {
  try {
    await fetch(SHEETS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({action: 'save_missions', missions})
    });
    // Update hash so auto-refresh does not re-trigger immediately
    lastDataHash = JSON.stringify(missions);
    console.log('Missions sauvegardées ✅');
    return true;
  } catch(e) {
    console.log('Sync error:', e);
    return false;
  }
}

async function loadMissionsFromSheets() {
  try {
    showSyncIndicator(true);
    // Load missions
    const res = await fetch(SHEETS_URL);
    const text = await res.text();
    const data = JSON.parse(text);
    if(Array.isArray(data) && data.length > 0) {
      missions = data;
      nextMissionId = Math.max(...missions.map(m=>m.id), 0) + 1;
    }
    // Load employees
    await loadEmployees();
  } catch(e) {
    console.log('Load error:', e);
  } finally {
    showSyncIndicator(false);
    renderAll();
  }
}

function showSyncIndicator(loading) {
  let el = document.getElementById('sync-indicator');
  if(!el) {
    el = document.createElement('div');
    el.id = 'sync-indicator';
    el.style.cssText = 'position:fixed;top:60px;right:10px;background:var(--copper);color:white;padding:.3rem .8rem;border-radius:20px;font-size:.75rem;z-index:999;transition:opacity .3s';
    document.body.appendChild(el);
  }
  el.textContent = loading ? '⏳ Chargement...' : '✅ Synchronisé';
  el.style.opacity = '1';
  if(!loading) setTimeout(() => el.style.opacity = '0', 2000);
}

// ══ LOGIN ═════════════════════════════════════════════════════════════════════
function doLogin(){
  const login = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value.trim();
  const user = USERS.find(u=>u.login.toLowerCase()===login.toLowerCase() && u.pass===pass);
  if(!user){document.getElementById('login-err').textContent='Identifiant ou mot de passe incorrect';return}
  currentUser = user;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('topbar-username').textContent = user.nom + (user.isAdmin?' (Admin)':'');
  // Save session
  localStorage.setItem('desaem_user', JSON.stringify({id:user.id, login:user.login, nom:user.nom, isAdmin:user.isAdmin, role:user.role}));
  buildNav();
  loadMissionsFromSheets();
  startAutoRefresh();
}

function doLogout(){
  currentUser=null;
  localStorage.removeItem('desaem_user');
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('login-user').value='';
  document.getElementById('login-pass').value='';
  document.getElementById('login-err').textContent='';
}

document.getElementById('login-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});

// Auto-login from session
(function(){
  const saved = localStorage.getItem('desaem_user');
  if(saved){
    try {
      const u = JSON.parse(saved);
      const found = USERS.find(x=>x.login.toLowerCase()===u.login.toLowerCase());
      if(found){
        currentUser = found;
        document.getElementById('login-screen').style.display='none';
        document.getElementById('app').style.display='flex';
        document.getElementById('topbar-username').textContent = found.nom + (found.isAdmin?' (Admin)':'');
        buildNav();
        loadMissionsFromSheets();
      }
    } catch(e){ localStorage.removeItem('desaem_user'); }
  }
})();

// ══ NAV ═══════════════════════════════════════════════════════════════════════
function buildNav(){
  const nav = document.getElementById('main-nav');
  const tabs = currentUser.isAdmin
    ? [{id:'dashboard',label:'📊 Tableau de bord'},{id:'planning',label:'📅 Planning'},{id:'recherche',label:'🔍 Recherche'},{id:'employes',label:'👷 Équipe'}]
    : [{id:'dashboard',label:'📊 Résumé'},{id:'planning',label:'📅 Mes missions'},{id:'recherche',label:'🔍 Recherche'}];
  nav.innerHTML = tabs.map(t=>`<button class="nav-btn${t.id==='dashboard'?' active':''}" onclick="showTab('${t.id}',this)">${t.label}</button>`).join('');
  document.getElementById('refresh-bar').style.display = currentUser.isAdmin ? 'none' : 'block';
}

async function refreshMissions(){
  showToast('Actualisation en cours...');
  await loadMissionsFromSheets();
  showToast('✅ Missions mises à jour !');
}

function showTab(id, btn){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
  // Toggle full-width for planning
  const contentEl = document.querySelector('.content');
  if(id === 'planning'){
    contentEl.classList.add('planning-active');
    renderCalendar();
  } else {
    contentEl.classList.remove('planning-active');
    if(id==='employes') renderEmployes();
    if(id==='dashboard') renderDashboard();
    if(id==='recherche'){ document.getElementById('search-input').focus(); doSearch(''); }
  }
}

// ══ RENDER ALL ════════════════════════════════════════════════════════════════
function renderAll(){
  renderDashboard();
  // Set default view based on user type
  if(!calView) calView = 'week';
  renderCalendar();
  if(currentUser.isAdmin) renderEmployes();
  document.getElementById('m-prix-group').style.display = currentUser.isAdmin?'':'none';
  document.getElementById('m-facture-group').style.display = currentUser.isAdmin?'':'none';
  document.getElementById('ca-card').style.display = currentUser.isAdmin?'':'none';
}

// ══ DASHBOARD ═════════════════════════════════════════════════════════════════
function renderDashboard(){
  const now = new Date();
  const myMissions = currentUser.isAdmin ? missions : missions.filter(m=>m.monteurs.includes(currentUser.id));
  const thisMo = myMissions.filter(m=>{const d=new Date(m.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()});
  document.getElementById('stat-total').textContent = thisMo.length;
  document.getElementById('stat-confirme').textContent = thisMo.filter(m=>m.statut==='confirme').length;
  document.getElementById('stat-attente').textContent = thisMo.filter(m=>m.statut==='en_attente').length;
  document.getElementById('stat-termine').textContent = thisMo.filter(m=>m.statut==='termine').length;
  if(currentUser.isAdmin) renderCA();
  const upcoming = myMissions.filter(m=>new Date(m.date)>=new Date()&&m.statut!=='annule'&&m.statut!=='termine').sort((a,b)=>a.date>b.date?1:-1).slice(0,3);
  const el = document.getElementById('upcoming-missions');
  if(!upcoming.length){el.innerHTML='<p style="color:var(--grey);font-size:.85rem;text-align:center;padding:.5rem">Aucune mission à venir</p>';return}
  el.innerHTML = upcoming.map(m=>missionCard(m,true)).join('');
}

function renderCA(){
  const now = new Date();
  let filtered=[], labels=[];
  if(caPeriod==='mois'){
    filtered=missions.filter(m=>{const d=new Date(m.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()&&m.statut!=='annule'});
    for(let w=1;w<=4;w++){labels.push('S'+w);} 
    const vals=[0,0,0,0];
    filtered.forEach(m=>{const d=new Date(m.date);const w=Math.min(3,Math.floor((d.getDate()-1)/7));vals[w]+=(m.prix||0)});
    renderBars(vals,labels);
    document.getElementById('ca-val').textContent=(filtered.reduce((s,m)=>s+(m.prix||0),0)).toLocaleString('fr-FR')+' €';
  } else if(caPeriod==='trimestre'){
    const q=Math.floor(now.getMonth()/3);
    const months=['Jan','Fév','Mar','Avr','Mai','Juin','Juil','Août','Sep','Oct','Nov','Déc'];
    labels=[months[q*3],months[q*3+1],months[q*3+2]];
    const vals=[0,0,0];
    missions.filter(m=>m.statut!=='annule').forEach(m=>{const d=new Date(m.date);if(Math.floor(d.getMonth()/3)===q&&d.getFullYear()===now.getFullYear()){vals[d.getMonth()-q*3]+=(m.prix||0)}});
    renderBars(vals,labels);
    document.getElementById('ca-val').textContent=vals.reduce((s,v)=>s+v,0).toLocaleString('fr-FR')+' €';
  } else {
    const months=['J','F','M','A','M','J','J','A','S','O','N','D'];
    labels=months;
    const vals=new Array(12).fill(0);
    missions.filter(m=>m.statut!=='annule'&&new Date(m.date).getFullYear()===now.getFullYear()).forEach(m=>{vals[new Date(m.date).getMonth()]+=(m.prix||0)});
    renderBars(vals,labels);
    document.getElementById('ca-val').textContent=vals.reduce((s,v)=>s+v,0).toLocaleString('fr-FR')+' €';
  }
}

function renderBars(vals,labels){
  const max=Math.max(...vals,1);
  document.getElementById('ca-bars').innerHTML=vals.map((v,i)=>`<div class="bar" style="height:${Math.max(4,v/max*76)}px" title="${v.toLocaleString('fr-FR')} €"><span class="bar-val">${v>0?v.toLocaleString('fr-FR')+'€':''}</span></div>`).join('');
  document.getElementById('ca-bar-labels').innerHTML=labels.map(l=>`<div style="flex:1;text-align:center;font-size:.65rem;color:var(--grey)">${l}</div>`).join('');
}

function setCAPeriod(p,btn){
  caPeriod=p;document.querySelectorAll('#ca-card .filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderCA();
}

// ══ PLANNING ══════════════════════════════════════════════════════════════════
let calView = 'week';
let calDate = new Date(); // current reference date

function getMyMissions(){
  if(currentUser.isAdmin) return missions;
  // Monteurs see all their missions except "en_attente"
  return missions.filter(function(m){
    return m.monteurs.indexOf(currentUser.id) > -1 && m.statut !== 'en_attente' && m.statut !== 'annule';
  });
}

function setView(v, btn){
  calView = v;
  document.querySelectorAll('#tab-planning .filter-btn').forEach(function(b){ b.classList.remove('active'); });
  if(btn) btn.classList.add('active');
  renderCalendar();
}

function goToday(){
  calDate = new Date();
  calMonth = calDate.getMonth();
  calYear = calDate.getFullYear();
  renderCalendar();
}

function changeMonth(dir){
  if(calView === 'day'){
    calDate = new Date(calDate.getFullYear(), calDate.getMonth(), calDate.getDate() + dir);
  } else if(calView === 'week'){
    calDate = new Date(calDate.getFullYear(), calDate.getMonth(), calDate.getDate() + dir*7);
  } else if(calView === 'year'){
    calDate = new Date(calDate.getFullYear() + dir, calDate.getMonth(), 1);
  } else {
    calMonth += dir;
    if(calMonth > 11){ calMonth = 0; calYear++; }
    if(calMonth < 0){ calMonth = 11; calYear--; }
    calDate = new Date(calYear, calMonth, 1);
  }
  calMonth = calDate.getMonth();
  calYear = calDate.getFullYear();
  renderCalendar();
}

function renderCalendar(){
  const months = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];


  // Update label
  const label = document.getElementById('cal-month-label');
  if(calView === 'day'){
    label.textContent = calDate.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  } else if(calView === 'week'){
    const mon = getMonday(calDate);
    const sun = new Date(mon); sun.setDate(sun.getDate()+6);
    label.textContent = mon.toLocaleDateString('fr-FR',{day:'numeric',month:'short'}) + ' - ' + sun.toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'});
  } else if(calView === 'year'){
    label.textContent = calDate.getFullYear();
  } else {
    label.textContent = months[calMonth] + ' ' + calYear;
  }

  if(calView === 'month') renderMonthView();
  else if(calView === 'week') renderWeekView();
  else if(calView === 'day') renderDayView();
  else if(calView === 'year') renderYearView();
  else renderListView();
}

function getMonday(d){
  var day = d.getDay();
  var diff = (day === 0) ? -6 : 1 - day;
  return new Date(d.getFullYear(), d.getMonth(), d.getDate() + diff);
}

function formatTime(t){ return t || '00:00'; }

function missionColor(m){ return m.color || '#D4956A'; }

// ── WEEK VIEW (Google Agenda style) ──────────────────────────────────────────
function renderWeekView(){
  var myMissions = getMyMissions();
  var monday = getMonday(calDate);
  var days = [];
  for(var i=0; i<7; i++){
    var d = new Date(monday);
    d.setDate(d.getDate()+i);
    days.push(d);
  }
  var today = new Date();
  var todayStr = today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');
  var dayNames = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
  var SLOT_H = 30; // pixels per 30 min slot
  var START_H = 6;
  var END_H = 22;
  var SLOTS = (END_H - START_H) * 2; // 30min slots

  var pv = document.getElementById('planning-view');
  pv.innerHTML = '';
  pv.style.cssText = 'overflow:auto;height:calc(100vh - 110px);width:100%';

  var wrapper = document.createElement('div');
  wrapper.style.cssText = 'display:flex;flex-direction:column;width:100%;min-width:0';

  // Header row
  var headerRow = document.createElement('div');
  headerRow.style.cssText = 'display:grid;grid-template-columns:55px repeat(7,1fr);position:sticky;top:0;z-index:20;background:white;border-bottom:2px solid var(--border)';

  var corner = document.createElement('div');
  corner.style.cssText = 'background:var(--dark);border-right:1px solid #555';
  headerRow.appendChild(corner);

  days.forEach(function(d, idx){
    var dateStr = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    var isToday = dateStr === todayStr;
    var hdr = document.createElement('div');
    hdr.style.cssText = 'background:'+(isToday?'var(--copper)':'var(--dark)')+';color:white;text-align:center;padding:.35rem .2rem;cursor:pointer;border-right:1px solid #555';
    hdr.innerHTML = '<div style="font-size:.7rem;opacity:.8">'+dayNames[idx]+'</div><div style="font-weight:700;font-size:1rem">'+d.getDate()+'</div>';
    hdr.onclick = (function(ds){ return function(){
      calDate = new Date(ds+'T00:00');
      calView = 'day';
      document.querySelectorAll('#tab-planning .filter-btn').forEach(function(b){ b.classList.remove('active'); });
      var db = document.getElementById('view-btn-day');
      if(db) db.classList.add('active');
      renderCalendar();
    }; })(dateStr);
    headerRow.appendChild(hdr);
  });
  wrapper.appendChild(headerRow);

  // Grid body
  var gridBody = document.createElement('div');
  gridBody.style.cssText = 'display:grid;grid-template-columns:55px repeat(7,1fr);position:relative;flex:1;width:100%';

  // Time labels column
  var timeCol = document.createElement('div');
  timeCol.style.cssText = 'background:#fafafa;border-right:1px solid var(--border)';
  for(var s=0; s<SLOTS; s++){
    var h = START_H + Math.floor(s/2);
    var m = (s%2)*30;
    var label = document.createElement('div');
    label.style.cssText = 'height:'+SLOT_H+'px;border-bottom:1px solid '+(m===0?'#e0e0e0':'#f5f5f5')+';display:flex;align-items:'+(m===0?'flex-start':'center')+';justify-content:flex-end;padding-right:.3rem';
    if(m===0){
      label.innerHTML = '<span style="font-size:.65rem;color:#999;margin-top:-7px">'+String(h).padStart(2,'0')+'h</span>';
    }
    timeCol.appendChild(label);
  }
  gridBody.appendChild(timeCol);

  // Day columns
  days.forEach(function(d, dayIdx){
    var dateStr = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    var dayCol = document.createElement('div');
    dayCol.style.cssText = 'position:relative;border-right:1px solid var(--border)';
    dayCol.dataset.date = dateStr;

    // Slot backgrounds
    for(var s=0; s<SLOTS; s++){
      var mm = (s%2)*30;
      var slotDiv = document.createElement('div');
      slotDiv.style.cssText = 'height:'+SLOT_H+'px;border-bottom:1px solid '+(mm===0?'#e8e8e8':'#f5f5f5')+';cursor:pointer;box-sizing:border-box';
      var hh = START_H + Math.floor(s/2);
      slotDiv.onclick = (function(ds, slotH, slotM){ return function(e){
        if(currentUser.isAdmin) openMissionModalWithDate(ds, slotH, slotM);
      }; })(dateStr, hh, mm);
      dayCol.appendChild(slotDiv);
    }

    // Mission blocks
    var dayMissions = myMissions.filter(function(m){ return m.date === dateStr && m.statut !== 'annule'; });
    dayMissions.forEach(function(m, mi){
      var startParts = (m.heure||'08:00').split(':');
      var startH = parseInt(startParts[0]);
      var startM = parseInt(startParts[1]||0);
      var endParts = (m.heureFin||'').split(':');
      var endH = endParts[0] ? parseInt(endParts[0]) : startH+1;
      var endM = endParts[1] ? parseInt(endParts[1]) : startM;
      if(endH < startH || (endH===startH && endM<=startM)){ endH=startH+1; endM=startM; }

      var topPx = ((startH - START_H)*2 + startM/30) * SLOT_H;
      var heightPx = Math.max(SLOT_H, ((endH-startH)*2 + (endM-startM)/30) * SLOT_H) - 2;
      var color = missionColor(m);

      var mDiv = document.createElement('div');
      mDiv.style.cssText = 'position:absolute;left:'+(mi*2)+'px;right:2px;top:'+topPx+'px;height:'+heightPx+'px;background:'+color+';color:white;border-radius:4px;padding:.2rem .3rem;font-size:.72rem;overflow:hidden;cursor:grab;z-index:5;box-shadow:0 2px 4px rgba(0,0,0,.25);user-select:none';
      mDiv.dataset.missionId = m.id;
      mDiv.dataset.startH = startH;
      mDiv.dataset.startM = startM;
      mDiv.innerHTML = '<div style="font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+m.client+'</div>'+(heightPx>28?'<div style="opacity:.9;font-size:.68rem">'+formatTime(m.heure)+(m.heureFin?'–'+m.heureFin:'')+'</div>':'');

      // Click to open detail
      mDiv.onclick = function(e){
        if(!mDiv.dragging) openDetailModal(parseInt(mDiv.dataset.missionId));
      };

      // Drag & drop
      mDiv.addEventListener('mousedown', function(e){
        if(!currentUser.isAdmin) return;
        e.preventDefault();
        mDiv.dragging = false;
        var startY = e.clientY;
        var origTop = parseInt(mDiv.style.top);
        mDiv.style.cursor = 'grabbing';
        mDiv.style.opacity = '0.85';
        mDiv.style.zIndex = '50';

        function onMove(ev){
          var dy = ev.clientY - startY;
          if(Math.abs(dy) > 5) mDiv.dragging = true;
          var newTop = Math.max(0, Math.min(origTop + dy, (SLOTS-1)*SLOT_H));
          // Snap to 30min
          newTop = Math.round(newTop / SLOT_H) * SLOT_H;
          mDiv.style.top = newTop + 'px';
        }

        function onUp(ev){
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
          mDiv.style.cursor = 'grab';
          mDiv.style.opacity = '1';
          mDiv.style.zIndex = '5';

          if(mDiv.dragging){
            var newTop = parseInt(mDiv.style.top);
            var slotIdx = Math.round(newTop / SLOT_H);
            var newH = START_H + Math.floor(slotIdx/2);
            var newM = (slotIdx%2)*30;
            // Calculate duration
            var dur = (endH*60+endM) - (startH*60+startM);
            var newEndTotal = newH*60+newM+dur;
            var newEndH = Math.floor(newEndTotal/60);
            var newEndM = newEndTotal%60;
            // Update mission
            var mObj = missions.find(function(mx){ return mx.id === parseInt(mDiv.dataset.missionId); });
            if(mObj){
              mObj.heure = String(newH).padStart(2,'0')+':'+String(newM).padStart(2,'0');
              mObj.heureFin = String(Math.min(23,newEndH)).padStart(2,'0')+':'+String(newEndM).padStart(2,'0');
              saveMissionsToSheets();
              renderCalendar();
              showToast('⏰ Mission déplacée : '+mObj.heure);
            }
          }
        }

        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });

      // Touch support for mobile
      mDiv.addEventListener('touchstart', function(e){
        if(!currentUser.isAdmin) return;
        var touch = e.touches[0];
        var startY = touch.clientY;
        var origTop = parseInt(mDiv.style.top);
        mDiv.dragging = false;
        mDiv.style.opacity = '0.85';

        function onTouch(ev){
          var t = ev.touches[0];
          var dy = t.clientY - startY;
          if(Math.abs(dy) > 5) mDiv.dragging = true;
          var newTop = Math.max(0, Math.min(origTop+dy, (SLOTS-1)*SLOT_H));
          newTop = Math.round(newTop/SLOT_H)*SLOT_H;
          mDiv.style.top = newTop+'px';
          ev.preventDefault();
        }

        function onTouchEnd(){
          mDiv.removeEventListener('touchmove', onTouch);
          mDiv.removeEventListener('touchend', onTouchEnd);
          mDiv.style.opacity = '1';
          if(mDiv.dragging){
            var newTop = parseInt(mDiv.style.top);
            var slotIdx = Math.round(newTop/SLOT_H);
            var newH = START_H+Math.floor(slotIdx/2);
            var newM = (slotIdx%2)*30;
            var dur = (endH*60+endM)-(startH*60+startM);
            var newEndTotal = newH*60+newM+dur;
            var mObj = missions.find(function(mx){ return mx.id===parseInt(mDiv.dataset.missionId); });
            if(mObj){
              mObj.heure = String(newH).padStart(2,'0')+':'+String(newM).padStart(2,'0');
              mObj.heureFin = String(Math.min(23,Math.floor(newEndTotal/60))).padStart(2,'0')+':'+String(newEndTotal%60).padStart(2,'0');
              saveMissionsToSheets();
              renderCalendar();
              showToast('Mission déplacée !');
            }
          }
        }

        mDiv.addEventListener('touchmove', onTouch, {passive:false});
        mDiv.addEventListener('touchend', onTouchEnd);
      });

      dayCol.appendChild(mDiv);
    });

    gridBody.appendChild(dayCol);
  });

  wrapper.appendChild(gridBody);
  pv.appendChild(wrapper);

  // Scroll to 7h
  setTimeout(function(){ pv.scrollTop = (7-START_H)*2*SLOT_H; }, 50);
}

  pv.appendChild(container);

// ══ PASTE HANDLER ════════════════════════════════════════════════════════════
function handlePaste(e, el){
  e.preventDefault();
  var text = '';
  if(e.clipboardData){
    var html = e.clipboardData.getData('text/html');
    if(html){
      var tmp = document.createElement('div');
      tmp.innerHTML = html.replace(/<br[^>]*>/gi,'\n').replace(/<\/p>/gi,'\n').replace(/<\/div>/gi,'\n').replace(/<[^>]+>/g,'');
      text = (tmp.textContent || tmp.innerText || '').replace(/\n{3,}/g,'\n\n').trim();
    } else {
      text = e.clipboardData.getData('text/plain') || '';
    }
  } else {
    text = (window.clipboardData || {}).getData('Text') || '';
  }
  var s = el.selectionStart, en = el.selectionEnd, cur = el.value;
  el.value = cur.substring(0,s) + text + cur.substring(en);
  el.selectionStart = el.selectionEnd = s + text.length;
}

// ══ COPY TO CLIPBOARD ═════════════════════════════════════════════════════════
function copyToClipboard(text){
  navigator.clipboard.writeText(text).then(()=>{
    showToast('📋 Lien copié !');
  }).catch(()=>{
    // Fallback
    const el = document.createElement('textarea');
    el.value = text;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    showToast('📋 Lien copié !');
  });
}

  var planningBtn = document.querySelector('.nav-btn[onclick*="planning"]');

    showTab('planning', planningBtn);

    setTimeout(function(){
      document.querySelectorAll('#tab-planning .filter-btn').forEach(function(b){ b.classList.remove('active'); });

      if(listBtn) listBtn.classList.add('active');

  }
}

// ══ RECHERCHE ═════════════════════════════════════════════════════════════════
function doSearch(query){
  var el = document.getElementById('search-results');
  if(!el) return;
  query = (query||'').trim().toLowerCase();

  if(!query){
    el.innerHTML = '<div style="text-align:center;color:var(--grey);padding:2rem;font-size:.9rem">Tapez un mot-clé pour rechercher une mission</div>';
    return;
  }

  var myMissions = currentUser.isAdmin ? missions : missions.filter(function(m){
    return m.monteurs.indexOf(currentUser.id) > -1;
  });

  var results = myMissions.filter(function(m){
    var fields = [
      m.client||'',
      m.adresse||'',
      m.tel||'',
      m.desc||'',
      m.factureNum||'',
      m.date||'',
      m.heure||'',
      m.statut||''
    ].join(' ').toLowerCase();
    return fields.indexOf(query) > -1;
  });

  if(!results.length){
    el.innerHTML = '<div style="text-align:center;color:var(--grey);padding:2rem;font-size:.9rem">Aucune mission trouvée pour "<strong>' + query + '</strong>"</div>';
    return;
  }

  el.innerHTML = '<div style="font-size:.85rem;color:var(--grey);margin-bottom:.75rem">' + results.length + ' résultat(s) pour "' + query + '"</div>' +
    results.map(function(m){ return missionCard(m, false); }).join('');
}

// ══ AUTO REFRESH ══════════════════════════════════════════════════════════════
let autoRefreshInterval = null;
let lastDataHash = '';

function hashData(data){
  return JSON.stringify(data).length + '_' + (data.length || 0);
}

function startAutoRefresh(){
  if(autoRefreshInterval) clearInterval(autoRefreshInterval);
  autoRefreshInterval = setInterval(async()=>{
    if(!currentUser) return;
    try {
      const res = await fetch(SHEETS_URL + '?t=' + Date.now());
      const text = await res.text();
      const data = JSON.parse(text);
      if(Array.isArray(data)){
        const newHash = JSON.stringify(data);
        if(newHash !== lastDataHash){
          lastDataHash = newHash;
          missions = data;
          nextMissionId = Math.max(...missions.map(m=>m.id), 0) + 1;
          renderAll();
          showToast('🔄 Planning mis à jour');
        }
      }
    } catch(e){}
  }, 5000); // check every 5 seconds
}

const IMGBB_KEY = '2742fcdf6c38011943a7a7a3d8138cf2';

async function uploadFiles(){
  const input = document.getElementById('upload-file');
  if(!input.files.length){showToast('Sélectionne un fichier');return}
  const progress = document.getElementById('upload-progress');
  progress.style.display = 'block';
  progress.textContent = '⏳ Envoi en cours...';
  const mission = missions.find(m=>m.id===uploadingMissionId);
  if(!mission) return;
  if(!mission.attachments) mission.attachments = [];
  let success = 0;
  for(const file of input.files){
    try {
      const base64 = await fileToBase64(file);
      const isImage = file.type.startsWith('image/');
      let fileUrl = '';
      let fileName = file.name;
      if(isImage){
        // Use ImgBB for images
        const formData = new FormData();
        formData.append('key', IMGBB_KEY);
        formData.append('image', base64);
        formData.append('name', file.name);
        const res = await fetch('https://api.imgbb.com/1/upload', {
          method: 'POST',
          body: formData
        });
        const data = await res.json();
        if(data.success){
          fileUrl = data.data.url;
          fileName = data.data.title || file.name;
          success++;
        } else {
          showToast('Erreur ImgBB: ' + JSON.stringify(data));
          continue;
        }
      } else {
        // For PDFs use Google Apps Script
        const res = await fetch(SHEETS_URL, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            action: 'upload_file',
            fileName: file.name,
            mimeType: file.type,
            fileData: base64,
            missionId: uploadingMissionId,
            uploadedBy: currentUser.nom
          })
        });
        const data = await res.json();
        if(data.fileUrl){
          fileUrl = data.fileUrl;
          success++;
        } else {
          showToast('Erreur PDF: ' + (data.error||'inconnu'));
          continue;
        }
      }
      mission.attachments.push({
        name: fileName,
        url: fileUrl,
        by: currentUser.nom,
        date: new Date().toLocaleDateString('fr-FR'),
        type: file.type
      });
    } catch(e){
      showToast('Erreur: ' + e.message);
    }
  }
  if(success > 0){
    progress.textContent = '💾 Sauvegarde en cours...';
    const saved = await saveMissionsToSheets();
    progress.style.display = 'none';
    closeUploadModal();
    renderAll();
    if(saved){
      showToast('✅ ' + success + ' fichier(s) envoyé(s) et sauvegardé(s) !');
    } else {
      showToast('⚠️ Fichier envoyé mais erreur de sauvegarde');
    }
  } else {
    progress.style.display = 'none';
  }
}

function fileToBase64(file){
  return new Promise((resolve, reject)=>{
    // Compress images before upload
    if(file.type.startsWith('image/')){
      const img = new window.Image();
      const url = URL.createObjectURL(file);
      img.onload = ()=>{
        const canvas = document.createElement('canvas');
        const MAX = 1200;
        let w = img.width, h = img.height;
        if(w > MAX){ h = Math.round(h * MAX / w); w = MAX; }
        if(h > MAX){ w = Math.round(w * MAX / h); h = MAX; }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        URL.revokeObjectURL(url);
        const b64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
        resolve(b64);
      };
      img.onerror = reject;
      img.src = url;
    } else {
      const reader = new FileReader();
      reader.onload = ()=> resolve(reader.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    }
  });
}

// ══ CHANGE STATUS (admin only) ═══════════════════════════════════════════════
async function changeStatus(id, newStatus){
  const m = missions.find(function(m){ return m.id === id; });
  if(!m || !currentUser.isAdmin) return;
  m.statut = newStatus;
  if(newStatus !== 'termine'){
    m.completedBy = null;
    m.completedAt = null;
  }
  await saveMissionsToSheets();
  renderAll();
  showToast('✅ Statut mis à jour !');
}

// ══ DUPLICATE MISSION ════════════════════════════════════════════════════════
async function duplicateMission(id){
  const m = missions.find(function(m){ return m.id === id; });
  if(!m) return;
  var copy = JSON.parse(JSON.stringify(m));
  copy.id = nextMissionId++;
  copy.statut = 'en_attente';
  copy.client = copy.client + ' (copie)';
  copy.attachments = [];
  copy.comments = [];
  copy.completedBy = null;
  copy.completedAt = null;
  missions.push(copy);
  await saveMissionsToSheets();
  renderAll();
  showToast('📋 Mission dupliquée !');
}

// ══ COMPLETE MISSION ══════════════════════════════════════════════════════════
async function completeMission(id){
  if(!confirm('Marquer cette mission comme terminée ?'))return;
  const m = missions.find(m=>m.id===id);
  if(!m) return;
  m.statut = 'termine';
  m.completedBy = currentUser.nom;
  m.completedAt = new Date().toLocaleDateString('fr-FR');
  await saveMissionsToSheets();
  renderAll();
  showToast('✅ Mission marquée comme terminée !');
}
